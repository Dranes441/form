<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul{
            list-style: none;
            margin: 30px;
            padding: 30px;
            
        }
        li{
            margin: 10px;
            padding: 20px;
        }
        .red{
            background-color: rgb(217, 156, 156);
            border: 3px solid red;
            border-radius: 1000px;
            width: 170px;
        }
        .green{
             background-color: rgb(214, 246, 165);
            border: 3px solid green;
            border-radius: 9px;
            width: 170px;
        }
        .blue{
             background-color: rgb(183, 183, 253);
            border: 3px solid blue;
            border-radius: 9px;
            width: 170px;
        }
        .yellow{
             background-color: rgb(205, 234, 149);
            border: 3px solid yellow;
            border-radius: 9px;
            width: 170px;
        }
    </style>
</head>
<body>
    <ul>
        <li class="red">Warning information box</li>
        <li class="green">Tip information box</li>
        <li class="blue">Note information box</li>
        <li class="yellow">Done information box</li>
    </ul>
</body>
</html>
